<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORILLA AI SYSTEM - Prompt Generator</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #0a0f0d; 
            color: #e0e6e3;
            max-width: 600px; 
            margin: auto; 
            padding: 20px;
        }
        h2 { color: #00ffcc; text-align: center; }
        .box {
            background: #111a16;
            border: 1px solid #1f3a2f;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        label { font-weight: bold; color: #a3b8b0; display: block; margin-top: 15px; }
        select, input, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: #1a2922; border: 1px solid #2d4f3e; 
            color: #fff; border-radius: 5px; box-sizing: border-box;
        }
        button { 
            width: 100%; background: #00ffcc; color: #050807; 
            padding: 14px; border: none; font-weight: bold; 
            font-size: 16px; cursor: pointer; border-radius: 5px; 
            margin-top: 15px;
        }
        button:hover { background: #00b38f; }
        textarea { height: 180px; font-family: monospace; background: #070c0a; color: #00ffcc; }
        .footer-text { text-align: center; color: #4f7364; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>

    <h2>🦍 HÉCTOR EL JEFE GORILA IA SYSTEM</h2>
    
    <div class="box" id="formulario">
        <p style="text-align: center; margin-top: 0; color: #8ba398;">Configura tu Cerebro de Prompts en 3 pasos</p>
        
        <label for="modelo">1. ¿Qué modelo de IA estás utilizando?</label>
        <select id="modelo">
            <option value="ChatGPT-4o">ChatGPT-4o (OpenAI)</option>
            <option value="Claude 3.5 Sonnet">Claude 3.5 Sonnet (Anthropic)</option>
            <option value="Gemini 1.5 Pro">Gemini 1.5 Pro (Google)</option>
            <option value="Llama 3 (Local)">Llama 3 / UI Local</option>
        </select>

        <label for="ocupacion">2. ¿Cuál es tu ocupación o nicho de negocio?</label>
        <input type="text" id="ocupacion" placeholder="Ej: Ventas en Mercado Libre, Automatización, Refacciones">

        <label for="tarea">3. ¿Qué objetivo o dolor quieres resolver hoy?</label>
        <input type="text" id="tarea" placeholder="Ej: Responder preguntas rápido, crear copys de retención, optimizar script">

        <button onclick="procesarCerebro()">GENERAR PROMPT MAESTRO 🚀</button>
    </div>

    <div class="box" id="resultado-box" style="display:none;">
        <h3 style="color: #00ffcc; margin-top: 0;">🤖 PROMPT OPTIMIZADO LISTO</h3>
        <p style="font-size: 13px; color: #a3b8b0;">Copia este prompt y pégalo directamente en tu IA para activar sus nuevas habilidades:</p>
        <textarea id="output-prompt" readonly></textarea>
        <button onclick="copiarPrompt()" style="background: #ffffff; color: #000;">COPIAR AL PORTAPAPELES 📋</button>
    </div>

    <p class="footer-text">Pregúntame sin miedo • © 2026 GORILLA AI SYSTEM</p>

    <script>
        function procesarCerebro() {
            const modeloIA = document.getElementById('modelo').value;
            const ocupacion = document.getElementById('ocupacion').value || "Emprendedor / Automatizador";
            const tarea = document.getElementById('tarea').value || "Optimizar procesos operativos";

            const promptMaestro = `Actúa como un Ingeniero de Prompts de Élite y Experto en ${ocupacion}. Estás optimizando una tarea diseñada específicamente para ser ejecutada en el modelo ${modeloIA}.

### 🎯 OBJETIVO PRINCIPAL
Resolver con máxima eficiencia técnica y cero redundancia la siguiente tarea: "${tarea}"

### 🛠️ DIRECTRICES DE ARQUITECTURA (GORILLA CORE)
1. **Enfoque Práctico:** Estructura la respuesta paso a paso, priorizando la optimización de recursos y rendimiento del sistema.
2. **Formato Scannable:** Entrega bloques de código limpios o listas estructuradas sin rodeos teóricos innecesarios.
3. **Optimización de Contexto:** Adapta las respuestas para mantener una retención alta si se trata de contenido, o un consumo mínimo de recursos si es código.

### 📝 FORMATO DE SALIDA REQUERIDO
- **Diagnóstico Breve:** Análisis rápido del problema raíz.
- **Solución / Script:** El bloque técnico o estratégico listo para producción.
- **Validación:** Comandos o métricas para verificar el funcionamiento.

Comienza diciendo: "Entendido. Procesando requerimientos bajo el protocolo Gorilla AI para ${modeloIA}..."`;

            document.getElementById('resultado-box').style.display = 'block';
            document.getElementById('output-prompt').value = promptMaestro;
            document.getElementById('resultado-box').scrollIntoView({ behavior: 'smooth' });
        }

        function copiarPrompt() {
            const copyText = document.getElementById("output-prompt");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("¡Prompt maestro copiado con éxito! Pégalo en tu IA.");
        }
    </script>
</body>
</html>

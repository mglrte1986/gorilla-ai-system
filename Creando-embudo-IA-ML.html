<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORILLA AI - Sistema</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        #qrcode canvas {
            border: 3px solid #667eea;
            border-radius: 10px;
            padding: 10px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin: 20px 0;
        }
        .link-text {
            color: #667eea;
            font-weight: bold;
            word-break: break-all;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦍 GORILLA AI</h1>
        <h2 style="color: #764ba2; margin-bottom: 20px;">Escanea para acceder</h2>
        <div id="qrcode"></div>
        <p class="link-text">https://mglrte1986.github.io/gorilla-ai-system</p>
    </div>

    <script>
        // Generar QR con la URL correcta
        new QRCode(document.getElementById("qrcode"), {
            text: "https://mglrte1986.github.io/gorilla-ai-system",
            width: 300,
            height: 300,
            colorDark: "#667eea",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
